// FUNCION CAPA CATASTRO

function crearCapa(datos,relleno,contorno){

return L.geoJson(datos,{

style:function(){
return{
color:contorno,
weight:2,
fillColor:relleno,
fillOpacity:0.5
}
},

onEachFeature: function (feature, capa){console.log(feature.properties);

capa.bindPopup("<strong>Clave Catastral: </strong>"+ feature.properties['clavecatas'] + "<br>" +
"<strong>Zona: </strong>"+ feature.properties['zona'] + "<br>" +
"<strong>Sector: </strong>"+ feature.properties['sector']+ "<br>" +
"<strong>Manzana: </strong>"+ feature.properties['manzana']+ "<br>" +
"<strong>Lote: </strong>"+ feature.properties['lote'] + "<br>" +
"<strong>Propietario: </strong>"+ feature.properties['propietari']+ "<br>" +
"<strong>Cedula: </strong>"+ feature.properties['documentop']+ "<br>" +			   
"<strong>Dirección: </strong>"+ feature.properties['direccion'] + "<br>" +
"<strong>Área: </strong>"+ feature.properties['area_m2']+ "<br>" +
"<strong>Zona: </strong>"+ feature.properties['zonaurbano']+ "<br>" +
"<strong>Parroquia: </strong>"+ feature.properties['parroquia']+ "<br>" +
"<strong>Barrio: </strong>"+ feature.properties['barrio']+ "<br>" +
"<strong>Resolución: </strong>"+ feature.properties['RESOLUCION']+ "<br>" +
"<strong>Observación: </strong>"+ feature.properties['observacio']

);

// MOUSE SOBRE PREDIO

capa.on("mouseover",function(){

//map.dragging.disable();

this.setStyle({
color:'red',
weight:4,
fillOpacity:0.9
});

this.openPopup();

});

// SALIR DEL PREDIO

capa.on("mouseout",function(){
//map.dragging.enable();

this.setStyle({
color:contorno,
weight:2,
fillColor:relleno,
fillOpacity:0.5
});

this.closePopup();

});

}

});

}

// PARPADEO

function activarParpadeo(){

var estado=true;

setInterval(function(){

[capa2019,capa2020,capa2021,capa2022,capa2023,capa2024,capa2025].forEach(function(capa){

if(capa){

capa.eachLayer(function(layer){

if(estado){
layer.setStyle({fillOpacity:0.1,opacity:0.3});
}else{
layer.setStyle({fillOpacity:0.6,opacity:1});

estado=!estado;

// BUSCAR PREDIO

function buscarPredio(){

var texto=document.getElementById("textoBuscar").value.toLowerCase();

var capas=[capa2019,capa2020,capa2021,capa2022,capa2023,capa2024,capa2025];

// RESTAURAR ESTILO ORIGINAL
capas.forEach(function(capa){

if(capa){

capa.eachLayer(function(layer){

capa.resetStyle(layer);

});

}

});


// BUSCAR PREDIO
capas.forEach(function(capa){

if(capa){

capa.eachLayer(function(layer){

var p=layer.feature.properties;

if(
(p.clavecatas && p.clavecatas.toLowerCase().includes(texto)) ||
(p.propietari && p.propietari.toLowerCase().includes(texto)) ||
(p.documentop && p.documentop.toLowerCase().includes(texto))
){

map.fitBounds(layer.getBounds());

layer.setStyle({
color:'red',
weight:4,
fillColor:'red',
fillOpacity:0.9
});

layer.openPopup();

}

});

}

});

}

function iniciarVoz(){

  // Verificar compatibilidad
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Tu navegador no soporta reconocimiento de voz");
    return;
  }

  var reconocimiento = new SpeechRecognition();

  reconocimiento.lang = "es-EC"; // español
  reconocimiento.interimResults = false;
  reconocimiento.maxAlternatives = 1;

  reconocimiento.start();

  reconocimiento.onresult = function(event){

    var texto = event.results[0][0].transcript;
	
	console.log("Texto detectado:", texto); // 👈 AGREGA ESTO

	    // 👇 REEMPLAZOS PERSONALIZADOS
  texto = texto
    .replace(/raya/g, "-")
    .replace(/guion/g, "-")
    .replace(/guión/g, "-")
    .replace(/slash/g, "/")
    .replace(/barra/g, "/")
    .replace(/punto/g, ".")
    .replace(/coma/g, ",")
    .replace(/espacio/g, " ")
    .replace(/guion bajo/g, "_");

	
    // poner lo hablado en el input
    document.getElementById("textoBuscar").value = texto;

    // ejecutar búsqueda automáticamente
    buscarPredio();

  };

  reconocimiento.onerror = function(event){
    console.log("Error voz:", event.error);
    alert("Error en reconocimiento de voz");
  };

}

// COLORES AUTOMÁTICOS
function getColorParroquia(i){
var colores = [
"#fde0dd", // rosado suave
"#e0ecf4", // azul muy claro
"#e6f5d0", // verde suave
"#fff2ae", // amarillo suave
"#f1e2cc", // beige
"#d9f0f3", // celeste suave
"#fddbc7", // salmón claro
"#e7d4e8", // lila claro
"#ccebc5", // verde pastel
"#fbb4ae", // rosado claro
"#b3cde3", // azul pastel
"#decbe4", // lavanda
"#fed9a6", // naranja pastel
"#ffffcc", // amarillo pálido
"#e5d8bd"  // tierra claro
];
return colores[i % colores.length];
}

// PARROQUIAS
fetch("https://raw.githubusercontent.com/Antonio20252025/Catastro_BD_Legalizacion/refs/heads/main/Parroquias_Urbanas_y_Rurales.geojson")
.then(r=>r.json())
.then(data=>{

// guardar colores por parroquia
var coloresParroquia = {};
var i = 0;

var parroquias = L.geoJson(data,{

style:function(feature){

var nombre = (
feature.properties.parroquia ||
feature.properties.nombre ||
feature.properties.name ||
feature.properties.NOMBRE ||
"sin_nombre"
).toString().trim().toUpperCase();

// si no tiene color asignado, se le da uno
if(!coloresParroquia[nombre]){
coloresParroquia[nombre] = getColorParroquia(i++);
}

return{
color:"#333",
weight:1.5,
dashArray:"10,15",
fillColor:coloresParroquia[nombre], // 👈 color fijo por parroquia
fillOpacity:0.30,
opacity:0.9
}

},

onEachFeature:function(feature,layer){

var nombre =
feature.properties.name ||
feature.properties.nombre ||
feature.properties.NOMBRE ||
feature.properties.parroquia ||
"";

if(nombre!=""){

// TEXTO FIJO SIEMPRE VISIBLE
layer.bindTooltip(nombre,{
permanent:true,
direction:"center",
className:"labelParroquia"
});

}

}

});

grupoLimites.addLayer(parroquias);

});

// ================= MODO ADMIN =================


document.getElementById("btnAdmin").addEventListener("click", function(){

  var minutos = prompt("¿Cuántos MINUTOS quieres que dure el link? (60 = 1 hora)");

  if(!minutos) return;

  minutos = parseInt(minutos);
  if(isNaN(minutos) || minutos <= 0){
    minutos = 60;
  }

  var ahora = new Date();
  ahora.setMinutes(ahora.getMinutes() + minutos);

  var fechaExp = ahora.toISOString();

  var urlBase = window.location.origin + window.location.pathname;

  var linkFinal = urlBase + "?exp=" + fechaExp + "&token=ABC123";

  navigator.clipboard.writeText(linkFinal);

  // 👉 AQUÍ VA
  alert("Link válido por " + minutos + " minutos\n\n" + linkFinal);
  

});
</script>
